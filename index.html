<!DOCTYPE html>
<html>
<head lang="en">
    <meta charset="UTF-8">
    <title>登录界面</title>
    <link href="css/index.css" rel="stylesheet">
</head>
<body>
    <!--面板-->
    <div id="panel">
        <!--面板的头部-->
        <div class="panel-header">
            <h2>Welcome to league of Draven</h2>
        </div>
        <!--面板的内容-->
        <div class="panel-content">
            <div class="ipt">
                <label><img src="images/icon_people.png"></label>
                <input type="text" value="" placeholder="请输入用户名">
            </div>
            <div class="ipt">
                <label><img src="images/icon_password.png"></label>
                <input type="password" value="" placeholder="请输入密码">
            </div>
            <div class="forget">
                <input type="checkbox">
                <a href="#" class="pwdleft">
                <span>下次自动登录</span>
                </a>
                <a href="#" class="pwdright">
                <span>忘记密码？</span>
                </a>
            </div>
            <div class="login">
                <button>登录</button>
            </div>
            <div class="reg">
                还没账号?<a href="#">马上注册</a>
            </div>
        </div>
        <!--面板的底部-->
        <div class="panel-footer">
            <span>社交账号登录：</span>
                <img src="images/qq.png">
                <img src="images/weixin.png">
                <img src="images/sina.png">
       </div>

    </div>
</body>
</html>
